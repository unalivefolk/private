<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Log - My Personal Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 24px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1e293b;
            border: 3px solid #fff;
        }

        .timeline-line {
            position: absolute;
            left: -2px;
            top: 40px;
            bottom: 0;
            width: 2px;
            background: #cbd5e1;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1e293b;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Private Log</h1>
            <div id="connectionStatus" class="flex items-center justify-center gap-2 mt-2 text-xs text-slate-500">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-orange-400"></span>
                <span id="statusText">Sinkronisasi Cloud...</span>
            </div>
        </header>

        <!-- Input Area -->
        <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-6 mb-8">
            <textarea 
                id="noteInput" 
                rows="4" 
                class="w-full p-4 text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-slate-800 focus:border-transparent outline-none transition-all resize-none"
                placeholder="Tuliskan isi pikiranmu di sini..."></textarea>
            
            <div class="flex flex-col sm:flex-row gap-3 mt-4">
                <button 
                    id="saveBtn"
                    onclick="addNote()" 
                    disabled
                    class="flex-1 bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 text-white font-semibold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <span id="btnText">Simpan ke Cloud</span>
                </button>
                <button 
                    onclick="exportToTxt()" 
                    class="bg-white hover:bg-slate-50 text-slate-800 border border-slate-200 font-semibold py-3 px-6 rounded-xl transition-colors flex items-center justify-center gap-2">
                    Ekspor (.txt)
                </button>
            </div>
        </div>

        <!-- Timeline Section -->
        <div id="timelineContainer" class="relative ml-4 pl-8 pb-12 hidden">
            <div class="timeline-line"></div>
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-[0.2em] mb-6 -ml-8">Cloud History</h2>
            <div id="notesList" class="space-y-6"></div>
        </div>

        <!-- Empty / Loading States -->
        <div id="stateArea" class="text-center py-12">
            <div id="loadingIcon" class="flex justify-center mb-4">
                <div class="loading-spinner"></div>
            </div>
            <p id="stateMessage" class="text-slate-500">Membuka brankas data...</p>
        </div>
    </div>

    <!-- Notif -->
    <div id="notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all opacity-0 pointer-events-none transform translate-y-4 text-sm font-medium">
        Tersimpan!
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC22KkotjDzRHxhaBPvBfQGmh28uRQKspI",
            authDomain: "private-live.firebaseapp.com",
            projectId: "private-live",
            storageBucket: "private-live.firebasestorage.app",
            messagingSenderId: "187097743795",
            appId: "1:187097743795:web:06a0e8b226159d4eba4bc6",
            measurementId: "G-Y7XEYJ82BC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let notes = [];
        // Personal ID: Karena ini hanya untuk Anda, kita gunakan ID tetap
        // Agar data tersimpan di folder yang sama di semua device Anda
        const MY_LOG_ID = "my-exclusive-log";

        async function init() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error(err);
                document.getElementById('statusText').innerText = "Gagal Sinkronisasi";
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusDot').classList.replace('bg-orange-400', 'bg-green-500');
                document.getElementById('statusText').innerText = "Personal Cloud Active";
                document.getElementById('saveBtn').disabled = false;
                startListening();
            }
        });

        function startListening() {
            // Path: /artifacts/private-live/users/my-exclusive-log/logs
            const colRef = collection(db, 'artifacts', 'private-live', 'users', MY_LOG_ID, 'logs');

            onSnapshot(colRef, (snap) => {
                notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                // Urutkan berdasarkan waktu buat (terbaru di atas)
                notes.sort((a, b) => b.createdAt - a.createdAt);
                
                render();
                updateUI();
            }, (err) => {
                console.error(err);
                showNotif("Error memuat database");
            });
        }

        window.addNote = async function() {
            const input = document.getElementById('noteInput');
            const val = input.value.trim();
            if (!val) return;

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const now = new Date();
            const dateStr = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            try {
                const colRef = collection(db, 'artifacts', 'private-live', 'users', MY_LOG_ID, 'logs');
                await addDoc(colRef, {
                    content: val,
                    displayDate: `${dateStr} • ${timeStr}`,
                    createdAt: Date.now()
                });
                input.value = '';
                showNotif("Catatan aman di cloud");
            } catch (e) {
                showNotif("Gagal menyimpan ke cloud");
            } finally {
                btn.disabled = false;
            }
        };

        window.deleteNote = async function(id) {
            if (confirm("Hapus permanen entri ini?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', 'private-live', 'users', MY_LOG_ID, 'logs', id));
                    showNotif("Terhapus");
                } catch (e) {
                    showNotif("Gagal menghapus");
                }
            }
        }

        function render() {
            const list = document.getElementById('notesList');
            list.innerHTML = notes.map(n => `
                <div class="timeline-item relative bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${n.displayDate}</span>
                        <button onclick="deleteNote('${n.id}')" class="text-slate-300 hover:text-red-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                    <p class="text-slate-700 whitespace-pre-wrap leading-relaxed text-[15px] font-normal">${n.content}</p>
                </div>
            `).join('');
        }

        function updateUI() {
            const container = document.getElementById('timelineContainer');
            const state = document.getElementById('stateArea');
            if (notes.length > 0) {
                container.classList.remove('hidden');
                state.classList.add('hidden');
            } else {
                container.classList.add('hidden');
                state.classList.remove('hidden');
                document.getElementById('loadingIcon').classList.add('hidden');
                document.getElementById('stateMessage').innerText = "Cloud Log kosong. Mulai menulis...";
            }
        }

        window.exportToTxt = function() {
            if (!notes.length) return;
            let txt = "=== PRIVATE LOG CLOUD ARCHIVE ===\n\n";
            [...notes].reverse().forEach((n, i) => {
                txt += `ENTRI #${i+1}\n${n.displayDate}\n--------------------------\n${n.content}\n\n\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `private_log_archive.txt`;
            a.click();
        }

        function showNotif(m) {
            const n = document.getElementById('notification');
            n.innerText = m;
            n.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => n.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'), 2000);
        }

        init();
    </script>
</body>
</html>
