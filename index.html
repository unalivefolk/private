<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Log - Timeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 24px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            border: 3px solid #fff;
        }

        .timeline-line {
            position: absolute;
            left: -2px;
            top: 40px;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Private Log</h1>
            <p class="text-slate-500 mt-2">Arsip pikiran dan catatan harian pribadi Anda.</p>
        </header>

        <!-- Input Area -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <textarea 
                id="noteInput" 
                rows="4" 
                class="w-full p-4 text-slate-700 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"
                placeholder="Tuliskan entri baru hari ini..."></textarea>
            
            <div class="flex flex-col sm:flex-row gap-3 mt-4">
                <button 
                    onclick="addNote()" 
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-md shadow-blue-100 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                    Simpan ke Log
                </button>
                <button 
                    onclick="exportToTxt()" 
                    class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 px-6 rounded-xl transition-colors shadow-md shadow-slate-100 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    Ekspor Log (.txt)
                </button>
            </div>
        </div>

        <!-- Timeline Section -->
        <div id="timelineContainer" class="relative ml-4 pl-8 pb-12 hidden">
            <div class="timeline-line"></div>
            <h2 class="text-lg font-semibold text-slate-700 mb-6 -ml-8">Riwayat Log</h2>
            <div id="notesList" class="space-y-6">
                <!-- Entri log akan muncul di sini -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12">
            <div class="bg-slate-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="text-slate-400" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <p class="text-slate-500">Belum ada entri log. Mulailah mencatat untuk melacak pikiran Anda.</p>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notification" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-xl transition-all opacity-0 pointer-events-none transform translate-y-4">
        Log disimpan!
    </div>

    <script>
        // Memuat data dari LocalStorage saat aplikasi dibuka
        let notes = JSON.parse(localStorage.getItem('curhat_notes')) || [];

        // Langsung tampilkan catatan jika ada data yang tersimpan
        window.onload = function() {
            renderNotes();
        };

        function saveToLocalStorage() {
            localStorage.setItem('curhat_notes', JSON.stringify(notes));
        }

        function showNotification(text) {
            const notif = document.getElementById('notification');
            notif.innerText = text;
            notif.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => {
                notif.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 2000);
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();

            if (!text) return;

            const now = new Date();
            const timestamp = now.toLocaleDateString('id-ID', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            }) + ' - ' + now.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            const noteObj = {
                id: Date.now(),
                content: text,
                time: timestamp
            };

            notes.unshift(noteObj); 
            input.value = '';
            
            saveToLocalStorage();
            renderNotes();
            showNotification('Entri berhasil disimpan');
        }

        function renderNotes() {
            const container = document.getElementById('notesList');
            const timelineSection = document.getElementById('timelineContainer');
            const emptyState = document.getElementById('emptyState');

            if (notes.length > 0) {
                timelineSection.classList.remove('hidden');
                emptyState.classList.add('hidden');
            } else {
                timelineSection.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }

            container.innerHTML = notes.map(note => `
                <div class="timeline-item relative bg-white p-5 rounded-xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider">${note.time}</span>
                        <button onclick="deleteNote(${note.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                    <p class="text-slate-700 whitespace-pre-wrap leading-relaxed font-light">${note.content}</p>
                </div>
            `).join('');
        }

        function deleteNote(id) {
            if(confirm('Hapus entri log ini?')) {
                notes = notes.filter(n => n.id !== id);
                saveToLocalStorage();
                renderNotes();
                showNotification('Entri dihapus');
            }
        }

        function exportToTxt() {
            if (notes.length === 0) {
                alert('Tidak ada log untuk diekspor.');
                return;
            }

            let content = "=== PRIVATE LOG - ARSIP CATATAN ===\n";
            content += "Dibuat pada: " + new Date().toLocaleString('id-ID') + "\n\n";
            
            const exportNotes = [...notes].reverse();
            
            exportNotes.forEach((n, index) => {
                content += `[${index + 1}] ${n.time}\n`;
                content += `-----------------------------------\n`;
                content += `${n.content}\n\n`;
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            const dateStr = new Date().toISOString().split('T')[0];
            a.href = url;
            a.download = `private_log_${dateStr}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        document.getElementById('noteInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                addNote();
            }
        });
    </script>
</body>
</html>
