<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Log - Realtime Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -9px;
            top: 24px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #0f172a;
            border: 3px solid #fff;
            z-index: 10;
        }

        .timeline-line {
            position: absolute;
            left: -2px;
            top: 40px;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
        }

        .loading-spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #0f172a;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold tracking-tighter text-slate-900">Private Log</h1>
            <div id="connectionStatus" class="flex items-center justify-center gap-2 mt-3 text-[11px] font-semibold uppercase tracking-widest text-slate-400">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                <span id="statusText">Menghubungkan...</span>
            </div>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 mb-10 transition-all focus-within:ring-2 focus-within:ring-slate-200">
            <textarea 
                id="noteInput" 
                rows="4" 
                class="w-full p-2 text-slate-700 bg-transparent outline-none transition-all resize-none text-lg font-light"
                placeholder="Tuliskan isi pikiranmu..."></textarea>
            
            <div class="flex flex-col sm:flex-row gap-3 mt-6 border-t border-slate-50 pt-5">
                <button 
                    id="saveBtn"
                    onclick="addNote()" 
                    disabled
                    class="flex-[2] bg-slate-900 hover:bg-black disabled:bg-slate-200 text-white font-medium py-3 px-6 rounded-2xl transition-all flex items-center justify-center gap-2">
                    Simpan ke Cloud
                </button>
                <button 
                    onclick="exportToTxt()" 
                    class="flex-1 bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium py-3 px-6 rounded-2xl transition-all flex items-center justify-center gap-2">
                    Ekspor .txt
                </button>
            </div>
        </div>

        <!-- Timeline Section -->
        <div id="timelineContainer" class="relative ml-4 pl-10 pb-20 hidden">
            <div class="timeline-line"></div>
            <div id="notesList" class="space-y-8"></div>
        </div>

        <!-- States -->
        <div id="stateArea" class="text-center py-20 bg-white/50 rounded-3xl border border-dashed border-slate-200">
            <div id="loadingIcon" class="flex justify-center mb-4">
                <div class="loading-spinner"></div>
            </div>
            <p id="stateMessage" class="text-slate-400 text-sm font-light">Sinkronisasi Realtime...</p>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white border border-slate-100 px-8 py-4 rounded-2xl shadow-2xl transition-all opacity-0 pointer-events-none transform translate-y-4 text-sm font-semibold">
        Berhasil.
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyC22KkotjDzRHxhaBPvBfQGmh28uRQKspI",
            authDomain: "private-live.firebaseapp.com",
            databaseURL: "https://private-live-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "private-live",
            storageBucket: "private-live.firebasestorage.app",
            messagingSenderId: "187097743795",
            appId: "1:187097743795:web:06a0e8b226159d4eba4bc6",
            measurementId: "G-Y7XEYJ82BC"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        let notes = [];
        const MY_LOG_ID = "my-exclusive-log";

        // Inisialisasi Aplikasi
        async function start() {
            try {
                // Mencoba login anonim
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Firebase Auth Error:", err.code, err.message);
                const statusText = document.getElementById('statusText');
                if (err.code === 'auth/operation-not-allowed') {
                    statusText.innerText = "Error: Aktifkan Anonymous Auth di Console";
                } else {
                    statusText.innerText = "Gagal Login: " + err.code;
                }
                document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-red-500');
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusDot').classList.replace('bg-slate-300', 'bg-green-500');
                document.getElementById('statusText').innerText = "Realtime Cloud Aktif";
                document.getElementById('saveBtn').disabled = false;
                loadData();
            }
        });

        function loadData() {
            // Path Database: private-live/users/my-exclusive-log/logs
            const dbRef = ref(db, `private-live/users/${MY_LOG_ID}/logs`);
            
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    notes = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                    // Urutkan: entri terbaru di atas
                    notes.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                } else {
                    notes = [];
                }
                render();
                updateUI();
            }, (error) => {
                console.error("Database Error:", error);
                showNotif("Akses Ditolak: Cek Rules Database");
            });
        }

        window.addNote = async function() {
            const input = document.getElementById('noteInput');
            const content = input.value.trim();
            if (!content) return;

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const now = new Date();
            const timeLabel = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ', ' + 
                              now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            try {
                const dbRef = ref(db, `private-live/users/${MY_LOG_ID}/logs`);
                const newNoteRef = push(dbRef);
                await set(newNoteRef, {
                    content: content,
                    timeLabel: timeLabel,
                    createdAt: Date.now()
                });
                input.value = '';
                showNotif("Tersimpan di Cloud");
            } catch (e) {
                console.error("Save Error:", e);
                showNotif("Gagal menyimpan");
            } finally {
                btn.disabled = false;
            }
        };

        window.deleteNote = async function(id) {
            if (confirm("Hapus entri ini secara permanen?")) {
                try {
                    await remove(ref(db, `private-live/users/${MY_LOG_ID}/logs/${id}`));
                    showNotif("Entri dihapus");
                } catch (e) {
                    showNotif("Gagal menghapus");
                }
            }
        }

        function render() {
            const list = document.getElementById('notesList');
            list.innerHTML = notes.map(n => `
                <div class="timeline-item relative bg-white p-6 rounded-2xl shadow-sm border border-slate-50 transition-all hover:shadow-md">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">${n.timeLabel}</span>
                        <button onclick="deleteNote('${n.id}')" class="text-slate-200 hover:text-red-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        </button>
                    </div>
                    <p class="text-slate-600 whitespace-pre-wrap leading-relaxed font-light text-[16px]">${n.content}</p>
                </div>
            `).join('');
        }

        function updateUI() {
            const container = document.getElementById('timelineContainer');
            const state = document.getElementById('stateArea');
            if (notes.length > 0) {
                container.classList.remove('hidden');
                state.classList.add('hidden');
            } else {
                container.classList.add('hidden');
                state.classList.remove('hidden');
                document.getElementById('loadingIcon').classList.add('hidden');
                document.getElementById('stateMessage').innerText = "Riwayat masih kosong.";
            }
        }

        window.exportToTxt = function() {
            if (!notes.length) return;
            let txt = "=== PRIVATE LOG CLOUD ARCHIVE ===\n\n";
            [...notes].reverse().forEach((n, i) => {
                txt += `ENTRI #${i+1}\n${n.timeLabel}\n--------------------------\n${n.content}\n\n\n`;
            });
            const blob = new Blob([txt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `private_log_export.txt`;
            a.click();
        }

        function showNotif(m) {
            const n = document.getElementById('notification');
            n.innerText = m;
            n.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => n.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none'), 2000);
        }

        start();
    </script>
</body>
</html>

```
